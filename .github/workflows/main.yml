name: main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v4

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub==0.3.15 seaborn pandas scikit-learn
          
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run MLproject --env-manager=local 
      
      # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
          
      - name: upload to github
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if RUN_ID exists in the environment
          if [ -z "$RUN_ID" ]; then
            echo "Error: RUN_ID is not set. Exiting step."
            exit 1
          fi
          
          echo "Processing run artifacts for ID: $RUN_ID"
          
          # Buat folder terstruktur untuk run
          mkdir -p saved_runs/$RUN_ID
          
          # Salin hasil run jika folder mlruns ada
          if [ -d "mlruns/0/$RUN_ID" ]; then
            cp -r mlruns/0/$RUN_ID/* saved_runs/$RUN_ID/
          else
            echo "Source directory mlruns/0/$RUN_ID not found!"
            exit 1
          fi
          
          # Tambahkan metadata
          echo "Run ID: $RUN_ID" > saved_runs/$RUN_ID/metadata.txt
          echo "Date: $(date)" >> saved_runs/$RUN_ID/metadata.txt
          
          # Commit dan push
          git add saved_runs/
          git commit -m "Save artifacts from run $RUN_ID [skip ci]"
          git push origin main
